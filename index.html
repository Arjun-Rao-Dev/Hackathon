<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="script.js"></script>
   <link rel="stylesheet" href="style.css"/>
  <title>Caregiver Task Tracker</title>
</head>

<body>
  <div class="container">
    <header class="invert-target">
      <div>
        <h1>Caregiver Task Tracker</h1>
        <p>Log daily tasks for your elderly relative: medications, meals, and appointments.</p>
      </div>
      
    </header>

    <hr />

    <div class="grid invert-target">
      <!-- Left: Add task + list -->
      <section class="card">
        <h2>Add a task</h2>

        <form id="taskForm">
          <div class="row">
            <div>
              <label for="caregiverName">Caregiver name</label>
              <input id="caregiverName" name="caregiverName" type="text" placeholder="e.g., Maria" required />
            </div>
            <div>
              <label for="taskDate">Date</label>
              <input id="taskDate" name="taskDate" type="date" required />
            </div>
          </div>

          <label for="taskType">Task type</label>
          <select id="taskType" name="taskType" required>
            <option value="Medication">Medication</option>
            <option value="Meal">Meal</option>
            <option value="Appointment">Appointment</option>
            <option value="Other">Other</option>
          </select>

          <label for="taskDetails">Details</label>
          <textarea id="taskDetails" name="taskDetails" placeholder="e.g., Took morning pill with water. / Breakfast eaten / Dentist at 3pm."></textarea>

          <div class="task-actions" style="justify-content:flex-start;">
            <button class="btn primary" type="submit">Add task</button>
            <button class="btn" type="button" id="clearDayBtn" title="Removes tasks for the currently selected day">Clear selected day</button>
          </div>
        </form>

        <hr />

        <h3>Tasks</h3>
        <p id="daySummary" style="margin-top:0;"></p>

      </section>

      <!-- Right: Summary -->
      <aside class="card">
        <h2>Quick summary</h2>

        <label for="filterDate">View a specific day</label>
        <input id="filterDate" type="date" />

        <div style="margin-top:12px;">
          <div class="meta" id="countsLine">—</div>
        </div>

        <hr />

        <h3>How to use</h3>
        <ul>
          <li>Pick the date</li>
          <li>Choose task type</li>
          <li>Add details and caregiver name</li>
          <li>Repeat for other family members</li>
        </ul>
      </aside>
    </div>
  </div>
</body>
</html>
